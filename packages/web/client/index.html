<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Seacape Input</title>
        <style>
            :root {
                color: #1f2933;
                background: #f5f7fb;
                font-family:
                    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                    sans-serif;
            }

            body {
                margin: 0;
                min-height: 100vh;
            }

            main {
                box-sizing: border-box;
                min-height: 100vh;
                padding: 16px;
                display: flex;
                align-items: stretch;
                justify-content: center;
            }

            .card {
                box-sizing: border-box;
                width: min(100%, 460px);
                padding: 28px;
                border-radius: 18px;
                background: #ffffff;
                box-shadow: 0 20px 50px rgba(31, 41, 51, 0.12);
            }

            .centered {
                text-align: center;
            }

            .error {
                border: 1px solid #fecaca;
                color: #991b1b;
            }

            h1 {
                margin: 0 0 8px;
                color: #111827;
                font-size: 22px;
                letter-spacing: -0.02em;
            }

            p {
                margin: 0;
                line-height: 1.5;
                color: #52677a;
            }

            label {
                display: block;
                margin-top: 18px;
                color: #374151;
                font-size: 13px;
                font-weight: 700;
                letter-spacing: 0.04em;
                text-transform: uppercase;
            }

            input[type='text'] {
                box-sizing: border-box;
                width: 100%;
                margin-top: 6px;
                padding: 10px 12px;
                border: 1px solid #cbd5e1;
                border-radius: 8px;
                background: #ffffff;
                color: #1f2933;
                font: inherit;
                font-size: 15px;
            }

            input[type='text']:focus {
                outline: none;
                border-color: #2563eb;
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
            }

            .actions {
                margin-top: 22px;
                display: flex;
                gap: 10px;
            }

            button {
                padding: 10px 18px;
                border: 0;
                border-radius: 8px;
                font: inherit;
                font-weight: 700;
                cursor: pointer;
            }

            button.primary {
                background: #2563eb;
                color: #ffffff;
            }

            button.primary:hover {
                background: #1d4ed8;
            }

            button.primary:disabled {
                background: #93c5fd;
                cursor: not-allowed;
            }

            button.secondary {
                border: 1px solid #cbd5e1;
                background: #ffffff;
                color: #1f2933;
            }

            button.secondary:hover {
                background: #f8fafc;
            }

            .eyebrow {
                margin-bottom: 8px;
                color: #52677a;
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            .success {
                margin-top: 18px;
                padding: 12px 14px;
                border-radius: 10px;
                background: #ecfdf5;
                border: 1px solid #a7f3d0;
                color: #065f46;
                font-size: 14px;
            }

            .spinner {
                width: 32px;
                height: 32px;
                margin: 0 auto 16px;
                border: 3px solid #dbeafe;
                border-top-color: #2563eb;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <main>
            <section class="card centered">
                <div class="spinner" aria-hidden="true"></div>
                <p>Loading...</p>
            </section>
        </main>
        <script type="module" src="/src/index.ts"></script>
    </body>
</html>
